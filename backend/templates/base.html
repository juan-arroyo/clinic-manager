<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Gestión Clínica{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Colores de la clínica — definidos aquí para no repetirlos en cada template -->
    <style>
        .btn-primary { background-color: #2596be !important; border-color: #2596be !important; color: #ffffff !important; }
        .btn-primary:hover { background-color: #1a7a9e !important; border-color: #1a7a9e !important; }
        .text-primary { color: #2596be !important; }
        .bg-primary { background-color: #2596be !important; }
        body { background-color: #f0f6fa; color: #404040; }
        .link-primary { color: #2596be; }
        .link-primary:hover { color: #1a7a9e; text-decoration: underline; }
    </style>

    {% block extra_css %}{% endblock %}
</head>

<body class="min-h-screen">

    <!-- x-data inicializa Alpine.js con la variable 'open' para controlar el menú móvil -->
    <nav class="bg-white shadow-sm px-6 py-3 sticky top-0 z-50" x-data="{ open: false }">
        <div class="flex justify-between items-center">

            <a href="/" class="font-bold text-lg" style="color: #2596be;">
                Gestión Clínica
            </a>

            <div class="hidden md:flex gap-6 text-sm">
                <a href="{% url 'patients:list' %}" class="hover:underline" style="color: #404040;">Pacientes</a>
                <a href="{% url 'bonuses:list' %}" class="hover:underline" style="color: #404040;">Bonos</a>
                <a href="{% url 'sales:list' %}" class="hover:underline" style="color: #404040;">Ventas</a>
                <a href="{% url 'reports:index' %}" class="hover:underline" style="color: #404040;">Reportes</a>
            </div>

            <div class="hidden md:flex items-center gap-4 text-sm">
                <div
                    class="w-7 h-7 rounded-full border border-base-300"
                    style="background-color: {{ request.user.color }}"
                    title="{{ request.user.get_full_name }}"
                ></div>
                <a href="/perfil/" class="hover:underline" style="color: #404040;">
                    {{ request.user.first_name }}
                </a>
                <a href="/logout/" class="hover:underline text-error text-xs">
                    Cerrar sesión
                </a>
            </div>

            <!-- @click alterna 'open' para mostrar/ocultar el menú móvil -->
            <button class="md:hidden btn btn-ghost btn-sm" @click="open = !open">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

        </div>

        <!-- x-show muestra este bloque solo cuando open=true -->
        <div class="md:hidden mt-3 pb-2 border-t border-base-200" x-show="open">
            <div class="flex flex-col gap-3 pt-3 text-sm">
                <a href="{% url 'patients:list' %}" class="hover:underline" style="color: #404040;">Pacientes</a>
                <a href="{% url 'bonuses:list' %}" class="hover:underline" style="color: #404040;">Bonos</a>
                <a href="{% url 'sales:list' %}" class="hover:underline" style="color: #404040;">Ventas</a>
                <a href="{% url 'reports:index' %}" class="hover:underline" style="color: #404040;">Reportes</a>
                <div class="divider my-1"></div>
                <a href="/perfil/" class="hover:underline" style="color: #404040;">Mi perfil</a>
                <a href="/logout/" class="hover:underline" style="color: #404040;">Cerrar sesión</a>
            </div>
        </div>

    </nav>

    <main class="p-4 md:p-8">
        {% block content %}{% endblock %}
    </main>

    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <!-- Alpine.js — gestiona el menú móvil -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    {% block extra_js %}{% endblock %}

</body>
</html>
