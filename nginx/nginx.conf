# nginx/nginx.conf
# Configuración de Nginx como proxy inverso.
# Nginx recibe las peticiones del navegador y las redirige a Django.

server {
    listen 80;  # escucha en el puerto 80 (HTTP estándar)

    # Peticiones a /static/ las sirve Nginx directamente (más eficiente que Django)
    location /static/ {
        alias /app/staticfiles/;
    }

    # Peticiones a /media/ también las sirve Nginx directamente
    location /media/ {
        alias /app/media/;
    }

    # El resto de peticiones las pasa a Django (que escucha en el puerto 8000)
    location / {
        proxy_pass http://web:8000;  # 'web' es el nombre del servicio en docker-compose.yml
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}