# nginx/nginx.conf
# Proxy inverso entre Cloudflare Tunnel y Django (Gunicorn).
# Cloudflare gestiona HTTPS externamente — aquí solo circula HTTP interno.

server {
    listen 80;

    server_name clinic.jmarroyo.es;

    # Límite generoso para evitar errores al descargar PDFs de facturas
    client_max_body_size 10M;

    # Estáticos y media los sirve Nginx directamente — Django no interviene
    location /static/ {
        alias /app/staticfiles/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://web:8000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;          # IP real del cliente, pasada por Cloudflare
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;          # indica a Django que el origen es HTTPS

        # Timeouts amplios — la Pi comparte recursos con 25+ contenedores
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}