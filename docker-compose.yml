# docker-compose.yml
services:
  # --- BASE DE DATOS ---
  db:
    image: postgres:16
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      clinica_default:
        ipv4_address: 192.168.16.2   # IP fija para evitar problemas con iptables

  # --- APLICACIÓN DJANGO ---
  web:
    build: ./backend
    restart: unless-stopped
    labels:
      # Excluido de Watchtower — las actualizaciones automáticas de imagen
      # no son seguras para una app con migraciones de base de datos
      - "com.centurylinklabs.watchtower.enable=false"
    env_file:
      - .env
    volumes:
      - ./backend:/app
      - ./static:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - db
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings.prod
    # Secuencia de arranque: migraciones → estáticos → servidor
    # --workers 2: ajustado para Raspberry Pi 5 conviviendo con 25+ contenedores
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 2"
    networks:
      clinica_default:
        ipv4_address: 192.168.16.3   # IP fija para evitar problemas con iptables

  # --- PROXY INVERSO ---
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8083:80"   # puerto interno del homelab — Cloudflare Tunnel apunta aquí
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/staticfiles
      - ./media:/app/media
    depends_on:
      - web
    networks:
      clinica_default:
        ipv4_address: 192.168.16.4   # IP fija para evitar problemas con iptables


networks:
  clinica_default:
    name: clinica-solaz_default
    driver: bridge
    ipam:
      config:
        - subnet: 192.168.16.0/24
